<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion - QuEazy</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="navbar">
      <a href="/" class="brand">QuEazy</a>
    </div>

    <div class="container mt-40">
      <div id="loginCard" class="card text-center max-w-500 m-auto">
        <h2 class="mb-lg font-32">Connexion</h2>
        <p class="text-muted mb-lg">Connecte-toi pour sauvegarder tes scores et ton profil !</p>
        <div id="loginReason" class="d-none font-14 font-bold mb-lg p-md" style="background: var(--color-accent-soft); color: var(--color-accent); border-radius: var(--radius-md); border: 1px solid rgba(var(--color-accent-rgb),0.2);"></div>

        <div class="d-flex flex-column gap-md">
          <div class="form-group text-left">
            <label class="d-block mb-8 font-bold text-muted">Pseudo (optionnel)</label>
            <input id="pseudo" type="text" placeholder="Ton pseudo" class="w-full" />
          </div>
          
          <div class="form-group text-left">
            <label class="d-block mb-8 font-bold text-muted">Email</label>
            <input id="email" type="email" placeholder="ton@email.com" class="w-full" />
          </div>
          
          <div class="form-group text-left">
            <label class="d-block mb-8 font-bold text-muted">Mot de passe</label>
            <input id="password" type="password" placeholder="••••••••" class="w-full" />
          </div>

          <div id="loginError" class="text-danger font-14 d-none"></div>

          <button id="signIn" class="btn btn-primary h-56 font-18 w-full">
            <span>Se connecter</span>
          </button>
          
          <button id="signUp" class="btn h-56 w-full border-border">
            <span>Créer un compte</span>
          </button>

          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">Ou</span>
            <div class="divider-line"></div>
          </div>

          <button id="signInGoogle" class="btn h-56 w-full border-border">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.9-2.26 5.36-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            <span>Continuer avec Google</span>
          </button>

          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">Ou</span>
            <div class="divider-line"></div>
          </div>

          <button id="guestPlay" class="btn h-56 w-full border-accent bg-accent-light text-accent font-bold">
            <span>Jouer en tant qu'invité</span>
          </button>
        </div>
      </div>

      <!-- Message de succès / Email de vérification -->
      <div id="successCard" class="card text-center max-w-500 m-auto d-none">
        <div class="mb-lg">
          <div class="avatar-main m-auto mb-lg">📧</div>
          <h2 class="font-32">Vérifie tes emails !</h2>
        </div>
        <p class="text-muted mb-lg">Un lien de confirmation t'a été envoyé pour activer ton compte.</p>
        
        <div class="d-flex flex-column gap-md">
          <button id="backToLogin" class="btn btn-primary w-full">Retour à la connexion</button>
          <button id="resendEmail" class="btn w-full border-border font-14">
            Je n'ai rien reçu, renvoyer l'email
          </button>
        </div>
        <div id="resendMessage" class="mt-md font-14 text-success d-none"></div>
      </div>
    </div>

    <script src="/js/supabase-config.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
