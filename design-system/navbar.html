<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700&display=swap');
:root {
  --color-accent: #46178f;
  --tile-blue: #1368ce;
  --tile-red: #e21b3c;
  --radius-md: 16px;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0; font-family: 'Nunito', sans-serif; min-height: 300px;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,87,166,0.20) 0%, transparent 45%),
    radial-gradient(circle at 85% 15%, rgba(38,217,196,0.16) 0%, transparent 40%),
    linear-gradient(160deg, #46178f 0%, #2e0f5c 100%);
}
.navbar {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  padding: 0 24px; height: 72px; margin: 16px auto 0; max-width: 1000px;
  border-radius: 999px; background: rgba(14,14,16,0.72);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.03) inset;
}
.brand {
  font-size: 28px; font-family: 'Baloo 2', sans-serif; font-weight: 800;
  background: linear-gradient(90deg, #ff57a6 0%, var(--color-accent) 30%, #26d9c4 50%, var(--color-accent) 70%, #ff57a6 100%);
  background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-group { display: flex; gap: 12px; align-items: center; }
.nav-group:last-child { justify-content: flex-end; }
.btn-nav-main { background: var(--tile-blue); color: white; padding: 10px 24px; border-radius: 14px; font-weight: 800; font-family: 'Baloo 2', sans-serif; font-size: 14px; text-transform: uppercase; box-shadow: 0 5px 0 #0c4a96; text-decoration: none; }
.btn-nav-main.red { background: var(--tile-red); box-shadow: 0 5px 0 #9c1029; }
.btn-nav-secondary { background: white; color: var(--color-accent); border: 2px solid var(--color-accent); border-radius: var(--radius-md); font-weight: 800; padding: 6px 18px; font-family: 'Baloo 2', sans-serif; font-size: 14px; text-decoration: none; }
.profile-chip { display: flex; align-items: center; gap: 10px; padding: 6px 16px 6px 6px; border-radius: 999px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); }
.avatar-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--color-accent); }
.profile-name { color: white; font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
  <div class="navbar">
    <a class="brand">QuEazy</a>
    <div class="nav-group">
      <a class="btn-nav-main">Créer</a>
      <a class="btn-nav-main red">Rejoindre</a>
    </div>
    <div class="nav-group">
      <a class="btn-nav-secondary">Mes Quiz</a>
      <span class="profile-chip"><span class="avatar-dot"></span><span class="profile-name">Jeremy</span></span>
    </div>
  </div>
</body>
</html>
