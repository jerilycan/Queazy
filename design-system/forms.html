<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700&display=swap');
:root {
  --color-accent: #46178f;
  --color-accent-soft: rgba(70,23,143,0.1);
  --color-accent-rgb: 70,23,143;
  --color-text: #1d1147;
  --color-text-muted: #6b6190;
  --color-border: rgba(29,17,71,0.1);
  --radius-md: 16px;
}
* { box-sizing: border-box; }
body { margin: 0; padding: 32px; background: #f4f2fa; font-family: 'Nunito', sans-serif; }
h2 { font-family: 'Baloo 2', sans-serif; font-size: 15px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 32px 0 12px; }
h2:first-child { margin-top: 0; }
.row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; max-width: 480px; }
input, select {
  padding: 14px 18px; border-radius: var(--radius-md); border: 2px solid var(--color-border);
  background: #fcfdfe; font-size: 15px; font-family: inherit; flex: 1; min-width: 180px;
}
input:focus, select:focus {
  outline: none; border-color: var(--color-accent); background: white;
  box-shadow: 0 0 0 4px var(--color-accent-soft), 0 4px 12px rgba(var(--color-accent-rgb),0.15);
}
.checkbox-row { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; color: var(--color-text); }
.checkbox-custom { width: 18px; height: 18px; margin: 0; accent-color: var(--color-accent); }
</style>
</head>
<body>
  <h2>Champ texte</h2>
  <div class="row">
    <input placeholder="Ton pseudo" />
    <input placeholder="Focus (cliquer)" onfocus="" autofocus />
  </div>

  <h2>Select</h2>
  <div class="row">
    <select><option>Texte libre</option><option>Choix multiples (QCM)</option></select>
  </div>

  <h2>Checkbox</h2>
  <div class="row">
    <label class="checkbox-row"><input type="checkbox" class="checkbox-custom" checked /> Une seule tentative</label>
  </div>
</body>
</html>
